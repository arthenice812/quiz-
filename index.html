<head>

<style>
:root{--acc:#9D7BFF;--b1:#EFE6FF;--b2:#FFE0F0;--ink:#2B1A4A;--soft:#7a6aa0;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);
  background:linear-gradient(135deg,var(--b1),var(--b2));min-height:100%;
  transition:background .5s ease;overflow-x:hidden}
.wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.card{background:#fff;border-radius:36px;box-shadow:0 24px 60px rgba(70,45,110,.18);
  padding:40px;width:100%;max-width:980px;border:5px solid var(--acc)}
.disp{font-family:'Comfortaa',sans-serif;font-weight:700}
.pill{display:inline-block;background:var(--acc);color:#fff;font-weight:800;
  padding:8px 22px;border-radius:999px;font-size:clamp(13px,2.4vw,18px);letter-spacing:.5px}
.pill.ghost{background:#fff;color:var(--ink);border:2px solid var(--acc)}
h1.title{font-family:'Comfortaa',sans-serif;font-weight:700;color:var(--ink);
  font-size:clamp(26px,5vw,56px);margin:18px 0 6px;line-height:1.1}
.q{color:var(--soft);font-weight:600;font-size:clamp(16px,2.8vw,30px);margin:6px 0 0}
.crown{font-size:clamp(34px,6vw,64px);line-height:1}
/* options */
.opts{display:grid;gap:14px;margin-top:26px}
.opt{display:flex;align-items:center;gap:16px;background:#faf8ff;border:3px solid #eee7fb;
  border-radius:20px;padding:16px 20px;font-weight:800;font-size:clamp(16px,2.6vw,26px);
  cursor:pointer;transition:.15s;text-align:left;width:100%}
.opt .badge{flex:none;width:clamp(40px,6vw,58px);height:clamp(40px,6vw,58px);border-radius:14px;
  background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:'Comfortaa',sans-serif;font-weight:700;font-size:clamp(18px,3vw,28px)}
.opt.sel{border-color:var(--acc);background:#fff;box-shadow:0 8px 22px rgba(120,90,200,.18)}
.opt.correct{border-color:var(--acc);background:var(--acc);color:#fff}
.opt.correct .badge{background:#fff;color:var(--acc)}
.opt .pct{margin-left:auto;font-size:.8em;color:var(--soft)}
.opt.correct .pct{color:#fff}
/* chips */
.chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:22px}
.chip{background:#f1ecfb;color:var(--soft);font-weight:800;padding:8px 16px;border-radius:999px;
  font-size:clamp(13px,2vw,18px);transition:.2s}
.chip.on{background:var(--acc);color:#fff;transform:scale(1.05)}
.chip.ok{background:#2ec4b6;color:#fff;transform:scale(1.05)}
.chip.no{background:#ffd9d9;color:#c0392b}
.meta{margin-top:18px;color:var(--soft);font-weight:800;font-size:clamp(15px,2.4vw,22px)}
/* bars */
.bars{display:flex;flex-direction:column;gap:14px;margin-top:24px}
.row{position:relative;height:74px;border-radius:37px;background:#efeaf7;overflow:hidden;display:flex;align-items:center}
.fill{position:absolute;left:0;top:0;bottom:0;border-radius:37px;width:0;transition:width 1s cubic-bezier(.2,.8,.2,1)}
.row .nm{position:relative;z-index:2;padding-left:26px;font-weight:900;font-size:clamp(15px,2.4vw,26px)}
.row .vl{position:relative;z-index:2;margin-left:auto;padding-right:26px;font-weight:900;font-size:clamp(15px,2.4vw,26px)}
.row .cr{position:relative;z-index:2;padding-left:16px;font-size:clamp(20px,3vw,30px)}
/* QR / lobby */
#qr{background:#fff;padding:16px;border-radius:20px;display:inline-block;margin:10px}
.big{font-size:clamp(40px,9vw,120px);font-family:'Comfortaa',sans-serif;font-weight:700}
/* buttons (player + admin) */
.btn{font-family:'Nunito';font-weight:900;border:none;border-radius:18px;padding:18px 24px;
  font-size:clamp(16px,2.4vw,22px);cursor:pointer;color:#fff;background:var(--acc);transition:.15s}
.btn:active{transform:scale(.97)}
.btn.alt{background:#fff;color:var(--ink);border:2px solid var(--acc)}
.btn.warn{background:#ff6b6b}
.adminbar{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin:18px 0}
input.name{font-family:'Nunito';font-weight:800;font-size:22px;padding:16px 20px;border-radius:16px;
  border:3px solid var(--acc);width:100%;max-width:420px;text-align:center;outline:none}
.note{color:var(--soft);font-weight:700;margin-top:14px;font-size:15px}
.banner{background:#fff3cd;border:2px solid #ffd23f;border-radius:18px;padding:20px;max-width:680px;
  font-weight:700;color:#7a5c00;line-height:1.5}
a{color:var(--acc)}
.stars{position:fixed;inset:0;pointer-events:none;z-index:-1}
.star{position:absolute;font-size:24px;opacity:.55}
</style>
</head>

<script>

const LETTERS = ["А","Б","В","Г","Д"];
const QDATA = [
 {cat:"Богиня счетов 2026", q:"У кого больше всех выставленных счетов за 2026 год?",
  acc:"#2EC4B6", b1:"#D7FFF4", b2:"#CFF6FF",
  opts:["Иванова Полина","Винникова Екатерина","Батина Екатерина","Вострецова Кристина"], correct:1,

 {cat:"Чемпионка по реализациям 2026", q:"У кого больше всех реализаций за 2026 год?",
  acc:"#FF6B6B", b1:"#FFE3E3", b2:"#FFD6E8",
  opts:["Винникова Екатерина","Батина Екатерина","Вострецова Кристина","Иванова Полина"], correct:2,
  board:[["Вострецова Кристина","1196",1196],["Винникова Екатерина","1081",1081],["Иванова Полина","972",972],["Батина Екатерина","198",198]],
  winner:"Вострецова Кристина"},
 {cat:"Главная по поставщикам 2026", q:"Чей поставщик собрал больше всех счетов на оплату за 2026 год?",
  acc:"#E0A92E", b1:"#FFF6D6", b2:"#FFEFC2",
  opts:["ООО ИНТЕРНЕТ РЕШЕНИЯ — Умнова Виталия","ЦЕНТР-К ООО (ОБЦК) — Калужина Дарья","ПАО Вымпелком — Умнова Виталия","ИП Ларченко А.В. — Калужина Дарья"], correct:1,
  board:[["ЦЕНТР-К ООО (ОБЦК) — Калужина Дарья","159",159],["ООО ИНТЕРНЕТ РЕШЕНИЯ — Умнова Виталия","100",100],["ИП Ларченко А.В. — Калужина Дарья","72",72],["ПАО Вымпелком — Умнова Виталия","63",63]],
  winner:"Калужина Дарья (ЦЕНТР-К)"},
 {cat:"Королева реестра оплат 2026", q:"У кого самая большая сумма по реестру оплат за 2026 год?",
  acc:"#9D7BFF", b1:"#EFE6FF", b2:"#F6E0FF",
  opts:["Федосеева Виктория","Батина Екатерина","Калужина Дарья"], correct:1,
  board:[["Батина Екатерина","174 901 224 ₽",174901224],["Федосеева Виктория","11 336 742 ₽",11336742],["Калужина Дарья","92 160 ₽",92160]],
  winner:"Батина Екатерина"},
 {cat:"Гроза доработок 1С 2026", q:"У кого больше всех задач в Доработке 1С за 2026 год?",
  acc:"#4CC9F0", b1:"#DDF3FF", b2:"#E6ECFF",
  opts:["Иванова Полина","Калужина Дарья","Батина Екатерина","Федосеева Виктория"], correct:0,
  board:[["Иванова Полина","24",24],["Калужина Дарья","16",16],["Батина Екатерина","15",15],["Федосеева Виктория","14",14]],
  winner:"Иванова Полина"},
 {cat:"Лучший руководитель 2026", q:"У какого самого лучшего руководителя самые лучшие сотрудники?",
  acc:"#FF5DA2", b1:"#FFE0F0", b2:"#FFE8E0",
  opts:["не правильно","ты ошибаешься","Федосеева Виктория","не верно"], correct:2,
  boss:true, winner:"Федосеева Виктория"}
];
const FINAL=[
 ["🧾","Богиня счетов","Винникова Екатерина"],["📦","Повелительница поступлений","Умнова Виталия"],
 ["🚀","Чемпионка по реализациям","Вострецова Кристина"],["🏆","Главная по поставщикам","Калужина Дарья"],
 ["👑","Королева реестра оплат","Батина Екатерина"],["🛠","Гроза доработок 1С","Иванова Полина"],
 ["⭐","Лучший руководитель","Федосеева Виктория"]
];

// ambient stars
(function(){const s=document.getElementById('stars');const e=['✦','★','✧','●','✦'];
 for(let i=0;i<14;i++){const d=document.createElement('div');d.className='star';
 d.textContent=e[i%e.length];d.style.left=Math.random()*100+'%';d.style.top=Math.random()*100+'%';
 d.style.color=['#FF6B6B','#FF9F1C','#2EC4B6','#4CC9F0','#9D7BFF','#FF5DA2','#C7F464'][i%7];
 d.style.fontSize=(16+Math.random()*26)+'px';s.appendChild(d);}})();

const app=document.getElementById('app');
function setTheme(acc,b1,b2){document.documentElement.style.setProperty('--acc',acc);
  document.documentElement.style.setProperty('--b1',b1);document.documentElement.style.setProperty('--b2',b2);}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function ls(k,v){try{if(v===undefined)return localStorage.getItem(k);localStorage.setItem(k,v);}catch(e){return null;}}

// ---- config guard ----
if(String(firebaseConfig.apiKey).indexOf('PASTE')===0){
  app.innerHTML='<div class="banner">⚙️ Почти готово! Вставь свой конфиг Firebase в начало файла '+
  '(блок firebaseConfig), сохрани и открой снова.<br><br>Инструкцию я прислал в чате.</div>';
  throw new Error('config not set');
}

firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const G=db.ref('game');

/* ============================ PLAYER ============================ */
function playerInit(){
  let pid=ls('pid'), pname=ls('pname');
  if(pid && pname){ G.child('players/'+pid).update({name:pname,t:Date.now()}); listen(); }
  else showJoin();

  function showJoin(){
    app.innerHTML='<div class="card"><div class="crown">👑</div>'+
      '<h1 class="title">Квиз 2026</h1>'+
      '<p class="q">Введи своё имя, чтобы играть</p>'+
      '<div style="margin-top:22px"><input class="name" id="nm" placeholder="Имя" maxlength="24"></div>'+
      '<div style="margin-top:18px"><button class="btn" id="go">Войти в игру</button></div></div>';
    const nm=document.getElementById('nm');nm.focus();
    document.getElementById('go').onclick=()=>{
      const v=nm.value.trim();if(!v)return nm.focus();
      const ref=G.child('players').push();pid=ref.key;pname=v;
      ref.set({name:v,t:Date.now()});ls('pid',pid);ls('pname',v);listen();
    };
    nm.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('go').click();});
  }

  function listen(){
    G.child('state').on('value',s=>{
      const st=s.val()||{phase:'lobby',q:0};
      if(st.phase==='question') renderQ(st.q);
      else if(st.phase==='reveal') showResult(st.q);
      else if(st.phase==='scores'||st.phase==='final') waiting('Игра окончена 🎉','Смотри на экран — результаты и доска почёта!');
      else waiting('Привет, '+esc(pname)+'! 👋','Ждём, когда ведущий начнёт игру.');
    });
  }
  function showResult(qi){
    const d=QDATA[qi];setTheme(d.acc,d.b1,d.b2);
    G.child('answers/'+qi+'/'+pid).once('value',v=>{
      const a=v.val();
      if(a===d.correct) waiting('Ты угадала! 🎉','+1 очко. Смотри экран 📺');
      else if(a!=null) waiting('Не угадала 😅','Верно: '+esc(d.opts[d.correct])+'. Смотри экран 📺');
      else waiting('Ты не ответила 🙈','Верно: '+esc(d.opts[d.correct])+'. Смотри экран 📺');
    });
  }
  function waiting(t,sub){
    app.innerHTML='<div class="card"><div class="crown">✨</div><h1 class="title">'+t+'</h1><p class="q">'+sub+'</p></div>';
  }
  function renderQ(qi){
    const d=QDATA[qi];setTheme(d.acc,d.b1,d.b2);
    const aref=G.child('answers/'+qi+'/'+pid);
    let html='<div class="card"><span class="pill">Вопрос '+(qi+1)+' / 7</span>'+
      '<h1 class="title">'+esc(d.cat)+'</h1><p class="q">'+esc(d.q)+'</p><div class="opts">';
    d.opts.forEach((o,i)=>{html+='<button class="opt" data-i="'+i+'"><span class="badge">'+LETTERS[i]+'</span>'+esc(o)+'</button>';});
    html+='</div><p class="note">Можно поменять ответ, пока ведущий не открыл результат.</p></div>';
    app.innerHTML=html;
    aref.once('value',v=>{ if(v.val()!=null) mark(v.val()); });
    app.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{const i=+b.dataset.i;aref.set(i);mark(i);});
  }
  function mark(i){app.querySelectorAll('.opt').forEach(b=>b.classList.toggle('sel',+b.dataset.i===i));}
}

/* ============================ PRESENT (ТВ) ============================ */
function presentInit(){
  let players={},answers={};
  G.child('players').on('value',s=>{players=s.val()||{};draw();});
  G.child('state').on('value',()=>draw());
  G.child('answers').on('value',s=>{answers=s.val()||{};draw();});
  let cur=null;
  function draw(){
    G.child('state').once('value',s=>{
      const st=s.val()||{phase:'lobby',q:0};render(st);
    });
  }
  function render(st){
    const ids=Object.keys(players);
    if(st.phase==='lobby'){ lobby(ids); return; }
    if(st.phase==='final'){ final(); return; }
    if(st.phase==='scores'){ scores(ids); return; }
    const d=QDATA[st.q];setTheme(d.acc,d.b1,d.b2);
    if(st.phase==='reveal'){ d.boss?bossReveal(d):reveal(d,st.q,ids); return; }
    // question
    const ans=(answers[st.q])||{};
    const answered=ids.filter(id=>ans[id]!=null);
    let html='<div class="card"><span class="pill">Вопрос '+(st.q+1)+' / 7</span>'+
      '<h1 class="title">'+esc(d.cat)+'</h1><p class="q">'+esc(d.q)+'</p><div class="opts">';
    d.opts.forEach((o,i)=>{html+='<div class="opt"><span class="badge">'+LETTERS[i]+'</span>'+esc(o)+'</div>';});
    html+='</div><div class="meta">Ответили: '+answered.length+' / '+ids.length+'</div><div class="chips">';
    ids.forEach(id=>{const on=ans[id]!=null;html+='<span class="chip'+(on?' on':'')+'">'+esc(players[id].name)+(on?' ✓':'')+'</span>';});
    html+='</div></div>';
    app.innerHTML=html;
  }
  function lobby(ids){
    setTheme('#9D7BFF','#C9B6FF','#FFC2E2');
    app.innerHTML='<div class="card"><div class="crown">👑</div><div class="big">КВИЗ 2026</div>'+
      '<p class="q">Сканируй QR и заходи в игру</p><div id="qr"></div>'+
      '<div class="meta">Уже в игре: '+ids.length+'</div><div class="chips" id="ch"></div></div>';
    const url=location.origin+location.pathname+'?p';
    try{new QRCode(document.getElementById('qr'),{text:url,width:220,height:220,colorDark:'#2B1A4A'});}catch(e){}
    const ch=document.getElementById('ch');
    ids.forEach(id=>{const c=document.createElement('span');c.className='chip on';c.textContent=players[id].name;ch.appendChild(c);});
  }
  function reveal(d,qi,ids){
    const ans=(answers[qi])||{};
    const max=Math.max.apply(null,d.board.map(r=>r[2]));
    let html='<div class="card"><span class="pill">Правильный ответ</span>'+
      '<h1 class="title">'+esc(d.cat)+'</h1>'+
      '<p class="q" style="color:var(--acc);font-weight:900">Победительница: '+esc(d.winner)+'</p><div class="bars">';
    d.board.forEach((r,idx)=>{const w=Math.max(16,Math.round(r[2]/max*100));const win=idx===0;
      const col=win?'var(--acc)':'rgba(120,90,200,.18)';
      html+='<div class="row"><div class="fill" data-w="'+w+'" style="background:'+col+'"></div>'+
      (win?'<span class="cr">👑</span>':'<span class="cr" style="opacity:.4">'+(idx+1)+'</span>')+
      '<span class="nm">'+esc(r[0])+'</span><span class="vl">'+esc(r[1])+'</span></div>';});
    html+='</div>';
    html+='<div class="meta">Кто угадал:</div><div class="chips">';
    ids.forEach(id=>{const a=ans[id];let cls='no',mark=' ✗';
      if(a===d.correct){cls='ok';mark=' ✓';} else if(a==null){cls='';mark=' —';}
      html+='<span class="chip '+cls+'">'+esc(players[id].name)+mark+'</span>';});
    html+='</div></div>';
    app.innerHTML=html;
    requestAnimationFrame(()=>app.querySelectorAll('.fill').forEach(f=>f.style.width=f.dataset.w+'%'));
  }
  function correctCount(id){let c=0;for(let i=0;i<QDATA.length;i++){const a=answers[i]&&answers[i][id];if(a===QDATA[i].correct)c++;}return c;}
  function scores(ids){
    setTheme('#9D7BFF','#C9B6FF','#FFC2E2');
    const arr=ids.map(id=>({n:players[id].name,s:correctCount(id)})).sort((a,b)=>b.s-a.s);
    const max=arr.length?Math.max(1,arr[0].s):1;
    let html='<div class="card"><div class="crown">🏆</div><h1 class="title">Лучший угадайщик</h1>'+
      '<p class="q">Кто угадал больше всех номинанток</p><div class="bars">';
    if(!arr.length) html+='<p class="q">Нет игроков</p>';
    arr.forEach((r,idx)=>{const w=Math.max(14,Math.round(r.s/max*100));const win=idx===0&&r.s>0;
      const col=win?'var(--acc)':'rgba(120,90,200,.18)';
      html+='<div class="row"><div class="fill" data-w="'+w+'" style="background:'+col+'"></div>'+
      (win?'<span class="cr">👑</span>':'<span class="cr" style="opacity:.4">'+(idx+1)+'</span>')+
      '<span class="nm">'+esc(r.n)+'</span><span class="vl">'+r.s+' из 7</span></div>';});
    html+='</div></div>';
    app.innerHTML=html;
    requestAnimationFrame(()=>app.querySelectorAll('.fill').forEach(f=>f.style.width=f.dataset.w+'%'));
  }
  function bossReveal(d){
    app.innerHTML='<div class="card"><div class="crown">👑</div><span class="pill">Лучший руководитель 2026</span>'+
      '<h1 class="title" style="font-size:clamp(34px,7vw,84px)">Федосеева Виктория</h1>'+
      '<p class="q">…и её команда — самые лучшие!</p></div>';
  }
  function final(){
    setTheme('#9D7BFF','#C9B6FF','#FFC2E2');
    let html='<div class="card"><div class="crown">🎉</div><h1 class="title">Доска почёта 2026</h1><div class="bars">';
    FINAL.forEach(r=>{html+='<div class="row"><div class="fill" style="width:100%;background:rgba(120,90,200,.14)"></div>'+
      '<span class="cr">'+r[0]+'</span><span class="nm">'+esc(r[1])+'</span><span class="vl">'+esc(r[2])+'</span></div>';});
    html+='</div></div>';
    app.innerHTML=html;
  }
}

/* ============================ ADMIN ============================ */
function adminInit(){
  let players={},answers={},st={phase:'lobby',q:0};
  G.child('players').on('value',s=>{players=s.val()||{};draw();});
  G.child('answers').on('value',s=>{answers=s.val()||{};draw();});
  G.child('state').on('value',s=>{st=s.val()||{phase:'lobby',q:0};draw();});

  function setState(o){G.child('state').set(o);}
  function start(){G.child('answers').remove();setState({phase:'question',q:0});}
  function revealNow(){setState({phase:'reveal',q:st.q});}
  function next(){
    if(st.phase==='reveal'){ if(st.q>=QDATA.length-1) setState({phase:'scores',q:st.q}); else setState({phase:'question',q:st.q+1}); }
    else if(st.phase==='scores'){ setState({phase:'final',q:st.q}); }
  }
  function back(){ if(st.q>0) setState({phase:'question',q:st.q-1}); }
  function resetGame(){G.child('answers').remove();setState({phase:'lobby',q:0});}
  function clearPlayers(){G.child('players').remove();}

  function draw(){
    const ids=Object.keys(players);
    const d=QDATA[st.q]||{};
    const ans=(answers[st.q])||{};
    const answered=ids.filter(id=>ans[id]!=null);
    let phaseTxt={lobby:'Лобби',question:'Вопрос '+(st.q+1),reveal:'Показан ответ ('+(st.q+1)+')',scores:'Результаты игроков',final:'Доска почёта'}[st.phase]||st.phase;
    let html='<div class="card" style="max-width:760px;text-align:left">'+
      '<div style="text-align:center"><span class="pill">Пульт ведущего</span></div>'+
      '<h1 class="title" style="text-align:center;font-size:30px">'+phaseTxt+'</h1>';
    if(st.phase==='question'||st.phase==='reveal'){
      html+='<p class="q" style="text-align:center">'+esc(d.cat)+'</p>'+
        '<p style="text-align:center;font-weight:900;color:var(--acc)">Верно: '+LETTERS[d.correct]+' — '+esc(d.opts[d.correct])+'</p>';
    }
    html+='<div class="adminbar">';
    if(st.phase==='lobby') html+='<button class="btn" id="start">▶ Начать игру</button>';
    else if(st.phase==='question') html+='<button class="btn" id="reveal">Показать ответ</button><button class="btn alt" id="back">← Назад</button>';
    else if(st.phase==='reveal') html+='<button class="btn" id="next">'+(st.q>=QDATA.length-1?'К результатам →':'Следующий вопрос →')+'</button><button class="btn alt" id="back">← Назад</button>';
    else if(st.phase==='scores') html+='<button class="btn" id="next">Доска почёта →</button>';
    else if(st.phase==='final') html+='<button class="btn alt" id="start">↻ Сыграть заново</button>';
    html+='</div>';
    html+='<div class="meta" style="text-align:center">В игре: '+ids.length+
      ' · Ответили: '+answered.length+' / '+ids.length+'</div>';
    html+='<div class="chips">';
    ids.forEach(id=>{const a=ans[id];let cls='',mk='';
      if(st.phase==='reveal'){ if(a===(d&&d.correct)){cls=' ok';mk=' ✓';} else if(a!=null){cls=' no';mk=' ✗';} else {mk=' —';} }
      else if(a!=null){cls=' on';mk=' ✓';}
      html+='<span class="chip'+cls+'">'+esc(players[id].name)+mk+'</span>';});
    if(!ids.length) html+='<span class="note">Пока никто не подключился</span>';
    html+='</div>';
    html+='<div class="adminbar" style="margin-top:24px">'+
      '<button class="btn alt" id="reset">Сбросить игру</button>'+
      '<button class="btn warn" id="clear">Удалить игроков</button>'+
      '<button class="btn alt" id="opentv">📺 Открыть экран для ТВ</button></div>'+
      '<p class="note" style="text-align:center">«Открыть экран для ТВ» — нажми и перетащи это окно на телевизор. Игроки сканируют QR с того экрана.</p>'+
      '</div>';
    app.innerHTML=html;
    const on=(id,fn)=>{const el=document.getElementById(id);if(el)el.onclick=fn;};
    on('start',start);on('reveal',revealNow);on('next',next);on('back',back);
    on('reset',()=>{if(confirm('Сбросить игру в лобби? Ответы очистятся.'))resetGame();});
    on('clear',()=>{if(confirm('Удалить всех игроков?'))clearPlayers();});
    on('opentv',()=>window.open(location.origin+location.pathname+'#present','_blank'));
  }
}

/* ============================ HOME (стартовый выбор) ============================ */
function homeInit(){
  setTheme('#9D7BFF','#C9B6FF','#FFC2E2');
  app.innerHTML='<div class="card"><div class="crown">👑</div><div class="big">КВИЗ 2026</div>'+
    '<p class="q">Открыть как:</p>'+
    '<div class="adminbar" style="margin-top:24px">'+
    '<button class="btn" id="adm">🎛 Пульт ведущего</button>'+
    '<button class="btn alt" id="tv">📺 Экран для телевизора</button></div>'+
    '<p class="note">На своём ноуте открой «Пульт ведущего». Кнопку «Экран для телевизора» — на том окне, что выведешь на ТВ. Девочки ничего не открывают: просто сканируют QR с телевизора.</p></div>';
  document.getElementById('adm').onclick=()=>{location.hash='admin';location.reload();};
  document.getElementById('tv').onclick=()=>{location.hash='present';location.reload();};
}

const isPlayer=location.search.indexOf('p')>=0;
const h=location.hash;
if(isPlayer) playerInit();
else if(h==='#present') presentInit();
else if(h==='#admin') adminInit();
else homeInit();
</script>
